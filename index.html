<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GameDrop — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090f;--s1:#0d1120;--s2:#141828;--s3:#1b2235;
  --acc:#00e5a0;--acc-dim:rgba(0,229,160,.1);--acc-glow:rgba(0,229,160,.25);
  --gold:#f5a623;--gold-dim:rgba(245,166,35,.1);--gold-glow:rgba(245,166,35,.25);
  --pur:#b57cf5;--pur-dim:rgba(181,124,245,.1);--pur-glow:rgba(181,124,245,.25);
  --red:#ff4060;--txt:#dde4f0;--mut:#5b6680;--bdr:rgba(255,255,255,.07);
  --fD:'Chakra Petch',sans-serif;--fB:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--fB);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,229,160,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,.02) 1px,transparent 1px);
  background-size:48px 48px}
header{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-family:var(--fD);font-weight:700;font-size:1.05rem;color:var(--acc);letter-spacing:2.5px;display:flex;align-items:center;gap:9px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--acc);color:#000;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-right{display:flex;gap:9px;align-items:center}
.refresh-btn{background:none;border:1px solid var(--bdr);color:var(--mut);padding:7px 12px;border-radius:8px;cursor:pointer;font-family:var(--fB);font-size:.8rem;display:flex;align-items:center;gap:5px;transition:all .15s}
.refresh-btn:hover{border-color:var(--acc);color:var(--acc)}
.refresh-btn.spinning .ic{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cart-btn{background:var(--s2);border:1px solid var(--bdr);color:var(--txt);padding:8px 16px;border-radius:9px;cursor:pointer;font-family:var(--fB);font-size:.88rem;font-weight:500;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap}
.cart-btn:hover{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
.cart-count{background:var(--acc);color:#000;font-size:.65rem;font-weight:700;min-width:19px;height:19px;border-radius:10px;padding:0 4px;display:flex;align-items:center;justify-content:center;font-family:var(--fD);transition:transform .15s}
.cart-count.pop{transform:scale(1.5)}
.price-banner{background:#060d1a;border-bottom:1px solid var(--bdr)}
.pb-inner{display:flex;align-items:center;height:48px;gap:8px;padding:0 24px;overflow-x:auto;scrollbar-width:none}
.pb-inner::-webkit-scrollbar{display:none}
.pb-label{font-family:var(--fD);font-size:.65rem;font-weight:700;letter-spacing:2px;color:var(--mut);text-transform:uppercase;white-space:nowrap;margin-right:4px;flex-shrink:0}
.pb-pill{white-space:nowrap;padding:5px 13px;border-radius:20px;font-size:.78rem;font-family:var(--fD);font-weight:600;letter-spacing:.3px;flex-shrink:0}
.pb-pill.normal{background:var(--acc-dim);border:1px solid rgba(0,229,160,.22);color:var(--acc)}
.pb-pill.premium{background:var(--gold-dim);border:1px solid rgba(245,166,35,.22);color:var(--gold)}
.pb-pill.special{background:var(--pur-dim);border:1px solid rgba(181,124,245,.22);color:var(--pur)}
.pb-sep{color:var(--s3);font-size:18px;flex-shrink:0}
main{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:28px 24px}
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:180px;position:relative}
.sw input{width:100%;background:var(--s1);border:1px solid var(--bdr);color:var(--txt);padding:10px 13px 10px 38px;border-radius:9px;font-family:var(--fB);font-size:.9rem;outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--acc)}
.sw input::placeholder{color:var(--mut)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:13px;pointer-events:none}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tag,.tf{background:var(--s1);border:1px solid var(--bdr);color:var(--mut);padding:7px 12px;border-radius:7px;cursor:pointer;font-family:var(--fB);font-size:.8rem;transition:all .15s;white-space:nowrap}
.tag:hover,.tf:hover{border-color:rgba(255,255,255,.18);color:var(--txt)}
.tag.on,.tf.on-all{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.tf.on-normal{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.tf.on-premium{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.tf.on-special{border-color:var(--pur);color:var(--pur);background:var(--pur-dim)}
.sep-dot{color:var(--s3);font-size:16px}
.sh{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.st{font-family:var(--fD);font-size:1.2rem;font-weight:700}
.sc{color:var(--mut);font-size:.85rem}
.lu{font-size:.72rem;color:var(--mut)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:18px;color:var(--mut)}
.spinner{width:38px;height:38px;border:2px solid var(--s3);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
.err-box{background:rgba(255,64,96,.07);border:1px solid rgba(255,64,96,.18);color:#ff8090;padding:20px 24px;border-radius:10px;text-align:center;max-width:460px;margin:60px auto;font-size:.9rem;line-height:1.6}
.err-box strong{display:block;font-family:var(--fD);margin-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:11px;overflow:hidden;cursor:pointer;position:relative;transition:transform .2s,border-color .2s,box-shadow .2s;animation:fadeUp .23s ease both}
.card:hover:not(.soon){transform:translateY(-3px);border-color:rgba(255,255,255,.12);box-shadow:0 8px 28px rgba(0,0,0,.5)}
.card.sel-normal{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc),0 6px 22px var(--acc-glow)}
.card.sel-premium{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 6px 22px var(--gold-glow)}
.card.sel-special{border-color:var(--pur);box-shadow:0 0 0 1px var(--pur),0 6px 22px var(--pur-glow)}
.card.soon{opacity:.5;cursor:default}
.cover{width:100%;aspect-ratio:460/215;object-fit:cover;display:block;background:var(--s2)}
.card-body{padding:10px 11px}
.cn{font-family:var(--fD);font-size:.82rem;font-weight:600;line-height:1.3;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cf{display:flex;align-items:flex-end;justify-content:space-between;gap:6px}
.price-block{min-width:0}
.cp{font-family:var(--fD);font-size:.95rem;font-weight:700;color:var(--acc);line-height:1}
.cp.premium{color:var(--gold)}
.cp.special{color:var(--pur)}
.cp.soon-txt{color:var(--mut);font-size:.75rem}
.cp-sub{font-size:.67rem;color:var(--mut);margin-top:3px;line-height:1.3}
.cp-sub.premium{color:rgba(245,166,35,.55)}
.cp-sub.special{color:rgba(181,124,245,.55)}
.add{width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;font-weight:bold;border:1px solid;line-height:1}
.add.normal{border-color:var(--acc);background:var(--acc-dim);color:var(--acc)}
.add.normal:hover,.card.sel-normal .add.normal{background:var(--acc);color:#000}
.add.premium{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.add.premium:hover,.card.sel-premium .add.premium{background:var(--gold);color:#000}
.add.special{border-color:var(--pur);background:var(--pur-dim);color:var(--pur)}
.add.special:hover,.card.sel-special .add.special{background:var(--pur);color:#000}
.badge{position:absolute;font-size:.6rem;font-weight:700;font-family:var(--fD);padding:2px 7px;border-radius:3px;letter-spacing:.8px}
.badge.sel-b{top:6px;right:6px}
.badge.sel-b.normal{background:var(--acc);color:#000}
.badge.sel-b.premium{background:var(--gold);color:#000}
.badge.sel-b.special{background:var(--pur);color:#000}
.badge.tier-b{top:6px;left:6px}
.badge.tier-b.premium{background:#1e1200;border:1px solid rgba(245,166,35,.35);color:var(--gold)}
.badge.tier-b.special{background:#150c22;border:1px solid rgba(181,124,245,.35);color:var(--pur)}
.badge.free-b{top:6px;left:6px;background:#0e2318;border:1px solid rgba(0,229,160,.35);color:var(--acc)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity .28s}
.overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;top:0;right:0;bottom:0;width:min(500px,100vw);background:var(--s1);border-left:1px solid var(--bdr);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .33s cubic-bezier(.4,0,.2,1)}
.panel.open{transform:translateX(0)}
.phd{padding:16px 22px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pt{font-family:var(--fD);font-size:.95rem;font-weight:700;letter-spacing:1.5px}
.xb{background:var(--s2);border:1px solid var(--bdr);color:var(--mut);width:32px;height:32px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.xb:hover{color:var(--txt)}
.gift-notice{margin:12px 22px 0;padding:10px 14px;border-radius:8px;font-size:.82rem;font-weight:500;display:none;align-items:center;gap:8px}
.gift-notice.show{display:flex}
.gift-notice.ok{background:var(--acc-dim);border:1px solid rgba(0,229,160,.22);color:var(--acc)}
.gift-notice.pending{background:var(--pur-dim);border:1px solid rgba(181,124,245,.22);color:var(--pur)}
.cl{flex:1;overflow-y:auto;padding:12px 22px}
.cl::-webkit-scrollbar{width:4px}
.cl::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.ci{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--bdr);align-items:center}
.ci-img{width:74px;height:34px;object-fit:cover;border-radius:5px;background:var(--s2);flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:.84rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-tag{font-size:.68rem;margin-top:2px;font-weight:600;font-family:var(--fD)}
.ci-tag.normal{color:var(--mut)}
.ci-tag.premium{color:var(--gold)}
.ci-tag.special{color:var(--pur)}
.ci-tag.free{color:var(--acc)}
.rm{background:none;border:none;color:var(--mut);cursor:pointer;font-size:14px;padding:4px;border-radius:4px;transition:color .15s;flex-shrink:0}
.rm:hover{color:var(--red)}
.empty{text-align:center;color:var(--mut);padding:50px 0;font-size:.9rem}
.pft{border-top:1px solid var(--bdr);padding:16px 22px;flex-shrink:0}
.totals{margin-bottom:14px}
.trow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.84rem;gap:8px}
.trow.head{color:var(--mut);font-size:.75rem;padding-top:7px;text-transform:uppercase;letter-spacing:.5px;font-family:var(--fD)}
.trow.sub{color:var(--txt);padding-left:10px;font-size:.82rem}
.trow.sub .lbl{color:var(--mut)}
.trow.disc{color:var(--acc)}
.trow.disc-pur{color:var(--pur)}
.trow.total-row{font-family:var(--fD);font-size:1.15rem;font-weight:700;color:var(--txt);padding-top:10px;border-top:1px solid var(--bdr);margin-top:6px}
.trow.total-row span:last-child{color:var(--acc)}
.wa{width:100%;background:#25D366;color:#fff;border:none;padding:14px;border-radius:9px;font-family:var(--fD);font-size:.9rem;font-weight:700;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .2s;text-transform:uppercase}
.wa:hover:not(:disabled){background:#1db954;transform:translateY(-1px);box-shadow:0 4px 18px rgba(37,211,102,.4)}
.wa:disabled{background:var(--s2);color:var(--mut);cursor:not-allowed;transform:none;box-shadow:none}
@media(max-width:600px){
  header,main,.phd,.cl,.pft,.pb-inner{padding-left:14px;padding-right:14px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px}
  .logo-text{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">🎮</div>
    <span class="logo-text">GAMEDROP</span>
  </div>
  <div class="hdr-right">
    <button class="refresh-btn" id="refreshBtn" onclick="loadGames(true)"><span class="ic">↻</span> Actualizar</button>
    <button class="cart-btn" onclick="openPanel()">🛒 Mi Pedido <div class="cart-count" id="cartCount">0</div></button>
  </div>
</header>

<div class="price-banner">
  <div class="pb-inner">
    <span class="pb-label">PRECIOS</span>
    <div class="pb-pill normal">🟢 Normal: $9.900 c/u | 3×$19.900 | 6×$29.900</div>
    <div class="pb-sep">·</div>
    <div class="pb-pill premium">💛 Premium: $14.000 | $10.000 en combo</div>
    <div class="pb-sep">·</div>
    <div class="pb-pill special">🟣 Especial: $25.000 + 2 juegos de regalo</div>
  </div>
</div>

<main>
  <div class="sh">
    <div style="display:flex;align-items:baseline;gap:10px">
      <h1 class="st">Catálogo</h1>
      <span class="sc" id="gameCount"></span>
    </div>
    <span class="lu" id="lastUpdate"></span>
  </div>
  <div class="toolbar">
    <div class="sw"><span class="si">🔍</span><input type="text" id="searchInput" placeholder="Buscar juego..." oninput="renderGames()"/></div>
    <div class="filter-row">
      <div id="tierFilters"></div>
      <span class="sep-dot">·</span>
      <div id="filterTags"></div>
    </div>
  </div>
  <div id="gamesArea"><div class="loading"><div class="spinner"></div><span>Cargando catálogo...</span></div></div>
</main>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="phd"><span class="pt">🛒 MI PEDIDO</span><button class="xb" onclick="closePanel()">✕</button></div>
  <div class="gift-notice" id="giftNotice"><span>🎁</span><span id="giftNoticeTxt"></span></div>
  <div class="cl" id="cartList"></div>
  <div class="pft">
    <div class="totals" id="totals"></div>
    <button class="wa" id="waBtn" onclick="sendWhatsApp()" disabled>
      <span style="font-size:18px">📱</span> HACER PEDIDO POR WHATSAPP
    </button>
  </div>
</div>

<script>
/* ╔══════════════════════════════════════════════════════════╗
   ║              ⚙️  CONFIGURACIÓN GENERAL                   ║
   ╚══════════════════════════════════════════════════════════╝ */
const CONFIG = {
  storeName:   "GAMEDROP",
  whatsapp:    "5491112345678",   // ← número con código de país, sin + ni espacios
  aliasTienda: "gamedrop.mp",     // ← tu alias de cobro (aparece en el mensaje)
  currency:    "$",
  webhookUrl:  "https://flow.retroverse.games/webhook/gamedrop-catalog",

  prices: {
    normal:  { single: 9900, pack3: 19900, pack6: 29900 },
    premium: { solo: 14000, mixed: 10000 },
    special: { price: 25000, gifts: 2 },
  },

  /* ── MENSAJE DE WHATSAPP ──────────────────────────────────
     Variables disponibles para usar en cualquier parte:
       {storeName}     → nombre del negocio
       {aliasTienda}   → tu alias de cobro
       {listaNormal}   → lista de juegos normales con precios/packs
       {listaPremium}  → lista de juegos premium con precio aplicado
       {listaEspecial} → lista de juegos especiales
       {total}         → monto total a pagar
     ─────────────────────────────────────────────────────── */
  mensajeWA: `
🎮 *PEDIDO {storeName}*
━━━━━━━━━━━━━━━━━━━━
{listaNormal}{listaPremium}{listaEspecial}
💳 *TOTAL: {total}*
🏦 Transferir a: *{aliasTienda}*
━━━━━━━━━━━━━━━━━━━━
¡Muchas gracias! Confirmamos tu pedido a la brevedad 🙌
`.trim(),
};

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let GAMES=[], cart=[], activeTag="Todos", activeTier="all";
const fmt=n=>CONFIG.currency+Number(n).toLocaleString('es-AR');
const imgUrl=id=>`https://cdn.cloudflare.steamstatic.com/steam/apps/${id}/header.jpg`;
const FB=`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='460' height='215'><rect fill='%23141828' width='100%25' height='100%25'/><text y='50%25' x='50%25' dominant-baseline='middle' text-anchor='middle' fill='%235b6680' font-size='12' font-family='sans-serif'>Sin imagen</text></svg>`;

/* ═══════════════════════════════════════════════════════════
   LOAD
═══════════════════════════════════════════════════════════ */
async function loadGames(manual=false){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  if(!manual) document.getElementById('gamesArea').innerHTML=`<div class="loading"><div class="spinner"></div><span>Cargando catálogo...</span></div>`;
  try{
    const res=await fetch(CONFIG.webhookUrl,{cache:manual?'reload':'default'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    GAMES=data.games||data;
    const now=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastUpdate').textContent=`Actualizado ${now}`;
    renderTierFilters(); renderTags(); buildGrid(); renderTotals();
  }catch(err){
    document.getElementById('gamesArea').innerHTML=`<div class="err-box"><strong>No se pudo cargar el catálogo</strong>Verificá que el workflow de n8n esté activo.<br><br><code style="font-size:.78rem;opacity:.65">${CONFIG.webhookUrl}</code><br><br><button onclick="loadGames(true)" style="margin-top:10px;background:var(--s2);border:1px solid var(--bdr);color:var(--txt);padding:7px 18px;border-radius:8px;cursor:pointer;font-family:var(--fB)">Reintentar</button></div>`;
  }finally{btn.classList.remove('spinning');}
}

/* ═══════════════════════════════════════════════════════════
   PRICING
═══════════════════════════════════════════════════════════ */
function calcTotal(){
  const P=CONFIG.prices;
  const normals =cart.filter(g=>!g.tier||g.tier==='normal');
  const premiums=cart.filter(g=>g.tier==='premium');
  const specials=cart.filter(g=>g.tier==='special');
  const giftsAvailable=specials.length*P.special.gifts;
  const freeNormalIds=normals.slice(0,Math.min(giftsAvailable,normals.length)).map(g=>g.id);
  const giftsUsed=freeNormalIds.length, giftsRemaining=giftsAvailable-giftsUsed;
  const paidNormals=normals.filter(g=>!freeNormalIds.includes(g.id));
  const n=paidNormals.length;
  const packs6=Math.floor(n/6),rem6=n%6,packs3=Math.floor(rem6/3),singles=rem6%3;
  const normalTotal=packs6*P.normal.pack6+packs3*P.normal.pack3+singles*P.normal.single;
  const hasMixed=normals.length>0||specials.length>0;
  const premiumUnit=hasMixed?P.premium.mixed:P.premium.solo;
  const premiumTotal=premiums.length*premiumUnit;
  const specialTotal=specials.length*P.special.price;
  return{total:normalTotal+premiumTotal+specialTotal,normalTotal,premiumTotal,specialTotal,
    freeNormalIds,giftsAvailable,giftsRemaining,giftsUsed,
    packs6,packs3,singles,n,hasMixed,premiumUnit,
    normals,premiums,specials,paidNormals};
}

/* ═══════════════════════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════════════════════ */
function renderTierFilters(){
  const tiers=['all',...new Set(GAMES.map(g=>g.tier||'normal'))];
  const L={all:'Todos',normal:'🟢 Normal',premium:'💛 Premium',special:'🟣 Especial'};
  document.getElementById('tierFilters').innerHTML=tiers.map(t=>{
    const on=activeTier===t?` on-${t==='all'?'all':t}`:'';
    return `<button class="tf${on}" onclick="setTier('${t}')" style="margin-right:5px">${L[t]||t}</button>`;
  }).join('');
}
function setTier(t){activeTier=t;renderTierFilters();renderGames();}

function renderTags(){
  const all=['Todos',...new Set(GAMES.flatMap(g=>g.tags||[]))].filter(Boolean);
  document.getElementById('filterTags').innerHTML=all.map(t=>
    `<button class="tag${t===activeTag?' on':''}" onclick="setTag('${t}')" style="margin-right:5px">${t}</button>`
  ).join('');
}
function setTag(t){activeTag=t;renderTags();renderGames();}

/* ═══════════════════════════════════════════════════════════
   GRID
═══════════════════════════════════════════════════════════ */
function buildGrid(){document.getElementById('gamesArea').innerHTML=`<div class="grid" id="gamesGrid"></div>`;renderGames();}

function renderGames(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const {freeNormalIds}=calcTotal();
  const filtered=GAMES.filter(g=>
    (activeTier==='all'||(g.tier||'normal')===activeTier)&&
    (activeTag==='Todos'||(g.tags||[]).includes(activeTag))&&
    (!q||g.name.toLowerCase().includes(q))
  );
  document.getElementById('gameCount').textContent=`${filtered.length} juego${filtered.length!==1?'s':''}`;
  const grid=document.getElementById('gamesGrid');
  if(!grid) return;
  if(!filtered.length){grid.innerHTML=`<div style="grid-column:1/-1;color:var(--mut);padding:40px 0;text-align:center">Sin resultados</div>`;return;}
  const P=CONFIG.prices;
  grid.innerHTML=filtered.map((g,i)=>{
    const tier=g.tier||'normal';
    const inCart=cart.some(c=>c.id===g.id);
    const isFree=freeNormalIds.includes(g.id);
    const selClass=inCart?`sel-${tier}`:'';
    let priceHtml='';
    if(!g.available){
      priceHtml=`<div class="price-block"><span class="cp soon-txt">⏳ Próximamente</span></div>`;
    }else if(tier==='normal'){
      priceHtml=`<div class="price-block"><div class="cp">${fmt(P.normal.single)}</div><div class="cp-sub">3×${fmt(P.normal.pack3)} | 6×${fmt(P.normal.pack6)}</div></div>`;
    }else if(tier==='premium'){
      priceHtml=`<div class="price-block"><div class="cp premium">${fmt(P.premium.solo)}</div><div class="cp-sub premium">o ${fmt(P.premium.mixed)} en combo</div></div>`;
    }else{
      priceHtml=`<div class="price-block"><div class="cp special">${fmt(P.special.price)}</div><div class="cp-sub special">🎁 +${P.special.gifts} juegos de regalo</div></div>`;
    }
    const tierBadge=tier==='premium'?`<div class="badge tier-b premium">PREMIUM</div>`:tier==='special'?`<div class="badge tier-b special">ESPECIAL</div>`:'';
    return `
      <div class="card ${selClass}${!g.available?' soon':''}" style="animation-delay:${Math.min(i,15)*.028}s"
           onclick="${g.available?`toggleCart(${g.id})`:''}">
        ${inCart?`<div class="badge sel-b ${tier}">✓ EN PEDIDO</div>`:tierBadge}
        ${isFree?`<div class="badge free-b">🎁 GRATIS</div>`:''}
        <img class="cover" src="${imgUrl(g.appId)}" alt="${g.name}" onerror="this.src='${FB}'"/>
        <div class="card-body">
          <div class="cn">${g.name}</div>
          <div class="cf">${priceHtml}${g.available?`<button class="add ${tier}" onclick="event.stopPropagation();toggleCart(${g.id})">${inCart?'✓':'+'}</button>`:''}</div>
        </div>
      </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════
   CART
═══════════════════════════════════════════════════════════ */
function toggleCart(id){
  const game=GAMES.find(g=>g.id===id);if(!game||!game.available)return;
  const idx=cart.findIndex(c=>c.id===id);
  idx===-1?cart.push(game):cart.splice(idx,1);
  update();
}
function update(){
  const cnt=document.getElementById('cartCount');
  cnt.textContent=cart.length;cnt.classList.add('pop');setTimeout(()=>cnt.classList.remove('pop'),200);
  renderGames();renderCartList();renderTotals();
}

function renderCartList(){
  const el=document.getElementById('cartList');
  if(!cart.length){el.innerHTML=`<div class="empty">🎮<br><br>Agregá juegos al pedido</div>`;updateGiftNotice({giftsAvailable:0,giftsRemaining:0});return;}
  const calc=calcTotal();
  updateGiftNotice(calc);
  const TL={normal:'NORMAL',premium:'PREMIUM',special:'ESPECIAL + 2 REGALOS'};
  el.innerHTML=cart.map(g=>{
    const tier=g.tier||'normal';
    const isFree=calc.freeNormalIds.includes(g.id);
    return `<div class="ci">
      <img class="ci-img" src="${imgUrl(g.appId)}" alt="${g.name}" onerror="this.src='${FB}'"/>
      <div class="ci-info">
        <div class="ci-name">${g.name}</div>
        <div class="ci-tag ${isFree?'free':tier}">${isFree?'🎁 GRATIS — regalo':TL[tier]||''}</div>
      </div>
      <button class="rm" onclick="toggleCart(${g.id})">✕</button>
    </div>`;
  }).join('');
}

function updateGiftNotice({giftsAvailable,giftsRemaining}){
  const el=document.getElementById('giftNotice'),txt=document.getElementById('giftNoticeTxt');
  if(!giftsAvailable){el.classList.remove('show');return;}
  el.classList.add('show');
  if(giftsRemaining>0){
    el.className='gift-notice show pending';
    txt.textContent=`Podés agregar ${giftsRemaining} juego${giftsRemaining>1?'s':''} normal${giftsRemaining>1?'es':''} de regalo todavía`;
  }else{
    el.className='gift-notice show ok';
    txt.textContent=`${giftsAvailable} regalo${giftsAvailable>1?'s':''} aplicado${giftsAvailable>1?'s':''} ✓`;
  }
}

function renderTotals(){
  const el=document.getElementById('totals');
  const calc=calcTotal();
  const P=CONFIG.prices;
  if(!cart.length){el.innerHTML='';document.getElementById('waBtn').disabled=true;return;}
  let html='';
  if(calc.normals.length){
    html+=`<div class="trow head"><span style="color:var(--acc)">🟢 Normales (${calc.normals.length})</span></div>`;
    if(calc.giftsUsed>0) html+=`<div class="trow sub"><span class="lbl">${calc.giftsUsed} regalo${calc.giftsUsed>1?'s':''} (promo especial)</span><span style="color:var(--acc)">GRATIS</span></div>`;
    if(calc.packs6>0) html+=`<div class="trow sub"><span class="lbl">${calc.packs6}× pack de 6</span><span>${fmt(calc.packs6*P.normal.pack6)}</span></div>`;
    if(calc.packs3>0) html+=`<div class="trow sub"><span class="lbl">${calc.packs3}× pack de 3</span><span>${fmt(calc.packs3*P.normal.pack3)}</span></div>`;
    if(calc.singles>0) html+=`<div class="trow sub"><span class="lbl">${calc.singles} suelto${calc.singles>1?'s':''}</span><span>${fmt(calc.singles*P.normal.single)}</span></div>`;
  }
  if(calc.premiums.length){
    const lbl=calc.hasMixed?`${fmt(P.premium.mixed)} c/u (combo)`:`${fmt(P.premium.solo)} c/u`;
    html+=`<div class="trow head"><span style="color:var(--gold)">💛 Premium (${calc.premiums.length}) — ${lbl}</span></div>`;
    if(calc.hasMixed){const saved=calc.premiums.length*(P.premium.solo-P.premium.mixed);html+=`<div class="trow disc"><span>↓ Descuento combo</span><span>-${fmt(saved)}</span></div>`;}
  }
  if(calc.specials.length){
    html+=`<div class="trow head"><span style="color:var(--pur)">🟣 Especiales (${calc.specials.length})</span></div>`;
    if(calc.giftsRemaining>0) html+=`<div class="trow disc-pur"><span>🎁 Faltan ${calc.giftsRemaining} regalo${calc.giftsRemaining>1?'s':''} por elegir</span><span>—</span></div>`;
  }
  html+=`<div class="trow total-row"><span>TOTAL</span><span>${fmt(calc.total)}</span></div>`;
  el.innerHTML=html;
  document.getElementById('waBtn').disabled=false;
}

/* ═══════════════════════════════════════════════════════════
   WHATSAPP — usa CONFIG.mensajeWA como plantilla
═══════════════════════════════════════════════════════════ */
function buildListaNormal(calc){
  if(!calc.normals.length) return '';
  const P=CONFIG.prices;
  let lines=`\n🟢 *NORMALES (${calc.normals.length}):*\n`;
  calc.normals.forEach(g=>{
    lines+=`  • ${g.name}${calc.freeNormalIds.includes(g.id)?' 🎁 GRATIS':''}\n`;
  });
  const pd=[];
  if(calc.packs6>0) pd.push(`${calc.packs6}× pack de 6 = ${fmt(calc.packs6*P.normal.pack6)}`);
  if(calc.packs3>0) pd.push(`${calc.packs3}× pack de 3 = ${fmt(calc.packs3*P.normal.pack3)}`);
  if(calc.singles>0) pd.push(`${calc.singles} suelto${calc.singles>1?'s':''} = ${fmt(calc.singles*P.normal.single)}`);
  if(pd.length) lines+=`  📦 ${pd.join(' | ')}\n`;
  return lines;
}
function buildListaPremium(calc){
  if(!calc.premiums.length) return '';
  const P=CONFIG.prices;
  const lbl=calc.hasMixed?`${fmt(P.premium.mixed)} c/u (combo)`:`${fmt(P.premium.solo)} c/u`;
  let lines=`\n💛 *PREMIUM — ${lbl}:*\n`;
  calc.premiums.forEach(g=>{lines+=`  • ${g.name}\n`;});
  return lines;
}
function buildListaEspecial(calc){
  if(!calc.specials.length) return '';
  const P=CONFIG.prices;
  let lines=`\n🟣 *ESPECIALES (${fmt(P.special.price)} c/u + ${P.special.gifts} regalos):*\n`;
  calc.specials.forEach(g=>{lines+=`  • ${g.name}\n`;});
  if(calc.giftsRemaining>0) lines+=`  🎁 Faltan ${calc.giftsRemaining} regalo${calc.giftsRemaining>1?'s':''} por elegir\n`;
  return lines;
}

function sendWhatsApp(){
  if(!cart.length) return;
  const calc=calcTotal();

  // Construye las variables y reemplaza en la plantilla
  const vars={
    storeName:    CONFIG.storeName,
    aliasTienda:  CONFIG.aliasTienda,
    listaNormal:  buildListaNormal(calc),
    listaPremium: buildListaPremium(calc),
    listaEspecial:buildListaEspecial(calc),
    total:        fmt(calc.total),
  };

  let msg=CONFIG.mensajeWA;
  Object.entries(vars).forEach(([k,v])=>{
    msg=msg.replaceAll(`{${k}}`,v);
  });

  window.open(`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`,'_blank');
}

/* ═══════════════════════════════════════════════════════════
   PANEL
═══════════════════════════════════════════════════════════ */
function openPanel(){document.getElementById('panel').classList.add('open');document.getElementById('overlay').classList.add('open');renderCartList();renderTotals();}
function closePanel(){document.getElementById('panel').classList.remove('open');document.getElementById('overlay').classList.remove('open');}

loadGames();
</script>
</body>
</html>
